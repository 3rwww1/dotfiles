# Font (same family + size as Ghostty)
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# Match Ghostty default theme
background       #282c34
foreground       #c5c8c6

# Color palette (match Ghostty defaults)
color0  #1d1f21
color1  #cc6666
color2  #b5bd68
color3  #f0c674
color4  #81a2be
color5  #b294bb
color6  #8abeb7
color7  #c5c8c6
color8  #666666
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #eaeaea

# URL detection
url_style               straight
url_color               #c5c8c6
detect_urls             yes
show_hyperlink_targets  yes
open_url_with           default
mouse_map cmd+left click ungrabbed,grabbed mouse_handle_click link

# Shift+Enter workaround for Claude Code in tmux
map shift+enter send_text all \x1b\r

# Disable kitty tabs/splits (use tmux instead)
map cmd+t no_op
map cmd+enter no_op
map ctrl+shift+t no_op
map ctrl+shift+enter no_op

