# ── General ──────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
set -g history-limit 50000
set -g allow-rename off
set -g default-command "${SHELL}"

# ── Window title ─────────────────────────────────────────────────────
set -g set-titles on
set -g set-titles-string "#W"

# ── Terminal colors ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# ── Key bindings ─────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Splits: | vertical, - horizontal (inherit current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane borders ─────────────────────────────────────────────────────
set -g pane-border-style "fg=colour136"
set -g pane-active-border-style "fg=colour136"
set -g pane-border-lines single

# ── Status bar ───────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=colour235,fg=white"
set -g status-justify centre
set -g status-left " #[bold,fg=colour178]%a %d-%m-%Y W%V#[nobold,fg=white]  [#S] "
set -g status-left-length 40
set -g status-right "#[bold,fg=colour178] %H:%M:%S %Z "
set -g status-right-length 20
set -g status-interval 1
setw -g window-status-format " [#I]:#W "
setw -g window-status-current-format "#[bold,fg=colour178] [#I]:#W #[nobold]"
