# ── General ──────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
set -g history-limit 50000
set -g allow-rename off
set -g default-command "${SHELL}"

# ── Window title ─────────────────────────────────────────────────────
set -g set-titles on
set -g set-titles-string "#W"

# ── Terminal colors ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# ── Key bindings ─────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Splits: | vertical, - horizontal (inherit current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane borders ─────────────────────────────────────────────────────
set -g pane-border-style "fg=colour136"
set -g pane-active-border-style "fg=colour136"
set -g pane-border-lines single

# ── Status bar ───────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=colour235,fg=white"
set -g status-justify centre
set -g status-interval 1
set -g status-left " #[bold,fg=colour178]W%V %a %d-%m-%Y %H:%M:%S %Z#[nobold,fg=white]  [#S] "
set -g status-left-length 50
set -g status-right " b:#(pmset -g batt | grep -Eo '\\d+%%') #[fg=colour178]#(tmux-mem-cpu-load --graph-lines 0 --mem-mode 2 --averages-count 1 | awk '{printf \"r:%%s c:%%s l1m:%%s\", $1, $2, $3}')#[fg=white] #{net_speed} "
set -g status-right-length 80
setw -g window-status-format " [#I]:#W "
setw -g window-status-current-format "#[bold,fg=colour178] [#I]:#W #[nobold]"

# ── Plugins (TPM) ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @net_speed_format "d:%s u:%s"
run '~/.tmux/plugins/tpm/tpm'
